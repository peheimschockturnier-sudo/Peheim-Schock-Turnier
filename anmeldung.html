<!DOCTYPE html>
<html lang="de">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Anmeldung | 2. Peheimer Schock Turnier</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<nav>

    <div class="logo">
        <a href="index.html">
            <img src="images/logo.jpg" alt="SV Peheim">
        </a>
    </div>

    <ul>
        <li><a href="index.html">Startseite</a></li>
    </ul>

</nav>

<section class="form-section">

<h1>Anmeldung</h1>

<p>
Melde dein Team jetzt für das
<strong>2. Peheimer Schock Turnier</strong> an.
</p>

<form id="anmeldungForm">

<input type="text" placeholder="Vorname" name="vorname" required>

<input type="text" placeholder="Nachname" name="nachname" required>

<input type="tel" placeholder="Telefonnummer" name="telefon" required>

<input type="email" placeholder="E-Mail-Adresse" name="email" required>

<input type="text" placeholder="Teamname" name="teamname" required>

<input type="text" placeholder="Mitspieler 1 (Vor- und Nachname)" name="spieler1 (Vor- und Nachname)">

<input type="text" placeholder="Mitspieler 2 (Vor- und Nachname)" name="spieler2 (Vor- und Nachname)">

<input type="text" placeholder="Mitspieler 3 (Vor- und Nachname)" name="spieler3 (Vor- und Nachname)">

<input type="text" placeholder="Mitspieler 4 (Vor- und Nachname)" name="spieler4 (Vor- und Nachname)">

<label class="checkbox">

<input type="checkbox" required>

Ich akzeptiere die Datenschutzerklärung.

</label>

<button type="submit">

Jetzt anmelden

</button>

</form>

<div id="meldung"></div>

</section>

<script src="js/anmeldung.js"></script>

</body>

</html>
